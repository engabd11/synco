name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # numpy for the DSP; aiohttp (hue.bridge) and cryptography (hue.dtls/
        # stream) are imported by the test modules. They're bundled by Home
        # Assistant at runtime, so the manifest doesn't list them, but the
        # HA-free unit tests still need them installed here.
        run: pip install pytest numpy aiohttp cryptography
      - name: Run tests
        run: pytest tests/ -v
